# Configuración del Order Service
spring.application.name=order-service

# Puerto del servidor
server.port=8081

# URLs de microservicios externos
services.auth.base-url=http://localhost:8082/api/users
services.catalog.base-url=http://localhost:8083/api/products

# Banner personalizado
spring.main.banner-mode=console

# Configuración de logging
logging.level.root=INFO
logging.level.com.monolito.ecommerce=DEBUG

# Mensajes más descriptivos en desarrollo
server.error.include-message=always
server.error.include-binding-errors=always

# JWT Configuration
auth.jwt.secret=change-this-secret-key-to-at-least-32-bytes-long
auth.jwt.expiration-seconds=3600

# CORS Configuration (comma-separated list of allowed origins)
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000
